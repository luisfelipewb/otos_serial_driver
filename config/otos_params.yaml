otos_serial_node:
  ros__parameters:
    serial_port: /dev/arduino
    baud_rate: 115200
    frame_id: odom
    child_frame_id: base_footprint
    publish_tf: False

    linear_scalar: 1.0
    angular_scalar: 1.0

    use_sensor_stddev_covariance: true
    pose_covariance_diagonal_fallback: [0.02, 0.02, 99999.0, 99999.0, 99999.0, 0.05]
    twist_covariance_diagonal_fallback: [0.05, 0.05, 99999.0, 99999.0, 99999.0, 0.1]
